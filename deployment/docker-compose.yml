version: '3.3'
services:
  zookeeper:
    image: wurstmeister/zookeeper
    platform: linux/amd64
    ports:
    - "2181"
    networks:
    - "api.network"
    volumes:
      - "./zookeeper/data:/opt/zookeeper-3.4.13/data"
    hostname: zookeeper
  kafka:
    image: wurstmeister/kafka
    platform: linux/amd64
    command: [start-kafka.sh]
    ports:
    - "9092:9092"
    hostname: kafka
    networks:
    - "api.network"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1" # topic:partition:replicas
      KAFKA_ADVERTISED_HOST_NAME: kafka # docker-machine ip
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LOG_DIRS: /kafka/kafka-logs
      KAFKA_BROKER_ID: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./kafka:/kafka/kafka-logs
    depends_on:
    - "zookeeper"
  db:
    image: mysql:5.7
    platform: linux/amd64
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
    - '3307:3306'
    depends_on:
      kafka:
        condition: service_healthy
    expose:
    - '3306'
    volumes:
    - my-db:/var/lib/mysql
    networks:           
      - "api.network"   
  reciever:
    image: reciever
    restart: always
    ports:
      - "8080:8080"
    networks:
      - "api.network"
    env_file:
      - .env
    volumes:
      - ./config/reciever:/config
      - ./logs:/logs
    depends_on:
      kafka:
        condition: service_healthy
  storage:
    image: storage
    restart: always
    ports:
      - "8090:8090"
    networks:
      - "api.network"
    env_file:
      - .env
    volumes:
      - .config/storage:/config
      - ./logs:/logs
      #was absoulte path
    depends_on:
      kafka:
        condition: service_healthy
  processing:
    image: processing
    restart: always
    ports:
      - "8100:8100"
    networks:
      - "api.network"
    env_file:
      - .env
    volumes:
      - ./config/processing:/config
      - ./logs:/logs
      - processing-db:/data
    depends_on:
      - storage
  analyzer:
    image: analyzer
    restart: always
    ports:
      - "8110:8110"
    networks:
      - "api.network"
    env_file:
      - .env
    volumes:
      - ./config/analyzer:/config
      - ./logs:/logs
    depends_on:
      - "kafka"
  dashboard:
    image: dashboard
    ports:
      - "3000:3000"
    networks:
      - "api.network"
    depends_on:
      - "processing"
      - "analyzer"
  check:
    image: check
    restart: always
    ports:
      - "8130"
    networks:
      - "api.network"
    environment:
      - TARGET_ENV=test
    build:
      context: ../check
    volumes:
      - ./config/check:/config
      - ./logs:/logs
      - check-data:/data   
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    # start up the nginx only when all api containers have started
    depends_on:
      - "reciever"
      - "storage"
      - "processing"
      - "analyzer"
      - "dashboard"
    # connects the port 80 of the nginx container to localhost:80 or localhost
    ports:
      - "80:80"
    networks:
      - "api.network"
  anomaly_detector:
    image: anomaly_detector
    restart: always
    ports:
      - "8120"
    volumes:
      - ./logs:/logs
      - ./config/anomaly-detector:/config
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - api.network
    environment:
      - TARGET_ENV=test
    build:
      context: ../anomaly_detector
      
volumes:
  my-db:
  processing-db:
  check-data:

networks:
  api.network: